<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wholesalers | NexTrade</title>
  <meta name="description" content="Discover verified wholesalers across India on NexTrade. Filter by category, region, and verification status.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/global.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:        '#4361ee',
            'primary-dark': '#3f37c9',
            'primary-light':'#4895ef',
            danger:         '#ef233c',
            success:        '#2bc155',
            navy:           '#0f172a',
          },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    /* Classes referenced by JS-generated card HTML */
    .ws-card { background:#fff; border-radius:12px; border:1px solid #f1f5f9; box-shadow:0 1px 3px rgba(0,0,0,.05); transition:all .3s; display:flex; flex-direction:column; position:relative; overflow:hidden; }
    .ws-card:hover { transform:translateY(-3px); box-shadow:0 10px 25px rgba(0,0,0,.1); border-color:#cbd5e1; }
    .ws-card-banner { width:100%; height:120px; background:linear-gradient(135deg,#4361ee,#4cc9f0); background-size:cover; background-position:center; border-bottom:1px solid #f1f5f9; }
    .ws-card-body { padding:20px; display:flex; flex-direction:column; flex:1; }
    .ws-header { display:flex; align-items:flex-start; gap:15px; margin-bottom:15px; }
    .ws-avatar { width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; color:#fff; flex-shrink:0; }
    .ws-title { flex:1; }
    .ws-name { font-size:16px; font-weight:600; color:#1e293b; margin-bottom:2px; display:flex; align-items:center; gap:5px; }
    .ws-owner { font-size:12px; color:#64748b; }
    .verified-badge { color:#10b981; font-size:14px; }
    .ws-tag { display:inline-block; padding:4px 8px; background:#f1f5f9; color:#475569; border-radius:4px; font-size:11px; font-weight:600; margin-bottom:12px; text-transform:uppercase; letter-spacing:.5px; }
    .ws-details { font-size:13px; color:#475569; display:flex; flex-direction:column; gap:8px; margin-bottom:20px; flex:1; }
    .ws-details i { color:#94a3b8; width:16px; margin-right:5px; }
    .ws-actions { display:flex; gap:10px; border-top:1px solid #f1f5f9; padding-top:15px; }
    .btn-view { flex:1; background:#f8fafc; color:#4361ee; border:1px solid #e2e8f0; padding:8px 0; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; transition:.2s; text-align:center; text-decoration:none; display:block; }
    .btn-view:hover { background:#4361ee; color:#fff; border-color:#4361ee; }
    .btn-contact { width:36px; height:36px; display:flex; align-items:center; justify-content:center; background:#f1f5f9; border:none; border-radius:6px; color:#334155; cursor:pointer; transition:.2s; }
    .btn-contact:hover { background:#e2e8f0; color:#0f172a; }
    .empty-state { text-align:center; padding:60px 20px; grid-column:1/-1; color:#64748b; }
    .empty-state i { font-size:48px; color:#cbd5e1; margin-bottom:15px; display:block; }
    .empty-state h3 { color:#1e293b; font-size:18px; margin-bottom:5px; }
    .btn-clear { background:#1e293b; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; margin-top:12px; }
    .chip { padding:6px 12px; background:#f1f5f9; border:1px solid transparent; border-radius:20px; font-size:12px; color:#475569; cursor:pointer; transition:all .2s; white-space:nowrap; }
    .chip:hover { background:#e2e8f0; }
    .chip.active { background:#4361ee; color:#fff; border-color:#4361ee; }
    .page-btn { padding:6px 12px; background:#fff; border:1px solid #cbd5e1; border-radius:6px; cursor:pointer; color:#334155; font-size:13px; font-family:'Poppins',sans-serif; }
    .page-btn.active { background:#4361ee; color:white; border-color:#4361ee; }
    .page-btn:disabled { opacity:.5; cursor:not-allowed; }
    /* Toggle switch (referenced by verifiedOnly) */
    .toggle-switch { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:#475569; font-weight:500; }
    .toggle-switch input { display:none; }
    .slider { width:36px; height:20px; background:#cbd5e1; border-radius:20px; position:relative; transition:.3s; }
    .slider::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; background:#fff; border-radius:50%; transition:.3s; }
    .toggle-switch input:checked + .slider { background:#10b981; }
    .toggle-switch input:checked + .slider::after { transform:translateX(16px); }
    /* Modal */
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:1000; opacity:0; transition:.2s; }
    .modal-overlay.active { display:flex; opacity:1; }
    .modal-content { background:#fff; padding:24px; border-radius:12px; width:90%; max-width:360px; transform:translateY(20px); transition:.3s; position:relative; }
    .modal-overlay.active .modal-content { transform:translateY(0); }
    .modal-close { position:absolute; right:15px; top:15px; font-size:20px; color:#94a3b8; cursor:pointer; border:none; background:transparent; }
  </style>
</head>

<body class="bg-gray-50 font-sans overflow-x-hidden">

  <!-- ════ NAVBAR ════ -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between py-4">
        <a href="index.html" class="flex items-center gap-2 no-underline">
          <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center text-white">
            <i class="fas fa-arrow-trend-up text-lg"></i>
          </div>
          <span class="font-bold text-lg text-gray-900 hidden sm:block">Nex<span class="text-primary">Trade</span></span>
        </a>

        <nav class="hidden md:flex items-center gap-1">
          <a href="index.html"         class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-lg transition">Home</a>
          <a href="wholesalers.html"   class="px-3 py-2 text-sm font-medium text-primary bg-primary/5 rounded-lg">Wholesalers</a>
          <a href="browse-products.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-lg transition">Explore Products</a>
          <a href="contact.html"       class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-lg transition">Contact Us</a>
        </nav>

        <div class="hidden md:flex items-center gap-2">
          <a href="login.html"     id="loginBtn"     class="px-4 py-2 text-sm font-semibold text-primary hover:bg-primary/5 rounded-xl transition">Login</a>
          <a href="signup.html"    id="signupBtn"    class="px-4 py-2 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-xl transition">Sign Up</a>
          <a href="dashboard.html" id="dashboardBtn" class="px-4 py-2 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-xl transition" style="display:none;">Dashboard</a>
        </div>

        <button id="mobileMenuBtn" class="md:hidden p-2 text-gray-600 hover:text-primary focus:outline-none">
          <i class="fas fa-bars text-xl"></i>
        </button>
      </div>

      <!-- Mobile Menu -->
      <div id="mobileMenu" class="hidden md:hidden pb-4 border-t border-gray-100">
        <nav class="flex flex-col gap-1 pt-3">
          <a href="index.html"         class="px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-lg transition">Home</a>
          <a href="wholesalers.html"   class="px-3 py-2.5 text-sm font-medium text-primary bg-primary/5 rounded-lg">Wholesalers</a>
          <a href="browse-products.html" class="px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-lg transition">Explore Products</a>
          <a href="contact.html"       class="px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-primary hover:bg-primary/5 rounded-lg transition">Contact Us</a>
          <div class="flex gap-2 pt-2 border-t border-gray-100 mt-1">
            <a href="login.html"  id="loginBtnMobile"  class="flex-1 text-center py-2.5 text-sm font-semibold text-primary border border-primary rounded-xl hover:bg-primary/5 transition">Login</a>
            <a href="signup.html" id="signupBtnMobile" class="flex-1 text-center py-2.5 text-sm font-semibold text-white bg-primary rounded-xl hover:bg-primary-dark transition">Sign Up</a>
            <a href="dashboard.html" id="dashboardBtnMobile" class="flex-1 text-center py-2.5 text-sm font-semibold text-white bg-primary rounded-xl hover:bg-primary-dark transition" style="display:none;">Dashboard</a>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <!-- ════ HERO BAND ════ -->
  <div class="bg-navy text-white py-10 text-center px-4">
    <h1 class="text-3xl sm:text-4xl font-bold mb-2">Registered Wholesalers</h1>
    <p class="text-slate-400 mb-4">Discover verified wholesalers across India</p>
    <div class="inline-block bg-white/10 border border-white/20 text-white px-4 py-1.5 rounded-full text-sm font-semibold">
      <span id="countBadge">0</span> wholesalers
    </div>
  </div>

  <!-- ════ FILTERS BAR ════ -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 -mt-5 mb-8 relative z-10">
    <div class="bg-white rounded-2xl shadow-md p-4 sm:p-6 flex flex-wrap gap-4 items-center justify-between">
      <!-- Search -->
      <div class="relative flex-1 min-w-[200px]">
        <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input type="text" id="searchInput" placeholder="Search by name, business or email..."
               class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 transition">
      </div>

      <!-- Category Chips -->
      <div class="flex gap-2 flex-wrap" id="categoryChips">
        <button class="chip active" data-val="">All</button>
        <button class="chip" data-val="Grocery">Grocery</button>
        <button class="chip" data-val="Electronics">Electronics</button>
        <button class="chip" data-val="Textiles">Textiles</button>
        <button class="chip" data-val="Pharma">Pharma</button>
        <button class="chip" data-val="Hardware">Hardware</button>
        <button class="chip" data-val="FMCG">FMCG</button>
      </div>

      <!-- Filter Controls -->
      <div class="flex flex-wrap gap-3 items-center">
        <select id="cityFilter"
                class="px-3 py-2 border border-gray-200 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 transition bg-white text-gray-700">
          <option value="">All Regions</option>
        </select>
        <select id="sortBy"
                class="px-3 py-2 border border-gray-200 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 transition bg-white text-gray-700">
          <option value="name">Name A-Z</option>
          <option value="newest">Newest First</option>
        </select>
        <label class="toggle-switch">
          <input type="checkbox" id="verifiedOnly">
          <span class="slider"></span>
          Verified Only
        </label>
      </div>
    </div>
  </div>

  <!-- ════ GRID ════ -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8" id="wholesalersGrid"></div>

    <!-- Pagination -->
    <div class="flex justify-center items-center gap-2 mb-14 flex-wrap" id="paginationControls" style="display:none;">
      <button class="page-btn" id="prevBtn">Previous</button>
      <div id="pageNumbers" class="flex gap-1.5 flex-wrap"></div>
      <button class="page-btn" id="nextBtn">Next</button>
    </div>
  </div>

  <!-- ════ CONTACT MODAL ════ -->
  <div class="modal-overlay" id="contactModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h3 id="modalBizName" class="font-bold text-gray-900 text-lg mb-1"></h3>
      <p id="modalOwnerName" class="text-gray-500 text-sm mb-5"></p>
      <div class="flex items-center gap-3 mb-3 text-sm text-gray-700">
        <i class="fas fa-phone text-gray-400 w-4"></i>
        <span id="modalPhone"></span>
      </div>
      <div class="flex items-center gap-3 mb-6 text-sm">
        <i class="fas fa-envelope text-gray-400 w-4"></i>
        <a href="#" id="modalEmailLink" class="text-primary hover:underline"></a>
      </div>
      <button id="modalViewBtn"
              class="w-full bg-primary hover:bg-primary-dark text-white py-3 rounded-xl font-semibold text-sm transition border-none cursor-pointer">
        View Products
      </button>
    </div>
  </div>

  <!-- AI Chatbot -->
  <script src="/chatbot.js"></script>
  <script src="js/main.js"></script>

  <script>
    /* ALL JAVASCRIPT IDENTICAL TO ORIGINAL */
    document.addEventListener("DOMContentLoaded", async () => {
      const user = JSON.parse(localStorage.getItem("user"));
      if (user && user.role === 'wholesaler') { location.href = 'wholesaler-dashboard.html'; return; }

      const grid = document.getElementById("wholesalersGrid");
      const countBadge = document.getElementById("countBadge");
      const searchInput = document.getElementById("searchInput");
      const cityFilter = document.getElementById("cityFilter");
      const sortBy = document.getElementById("sortBy");
      const verifiedOnly = document.getElementById("verifiedOnly");
      const chips = document.querySelectorAll(".chip");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const pageNumbers = document.getElementById("pageNumbers");
      const paginationControls = document.getElementById("paginationControls");

      const state = { all: [], filtered: [], page: 1, perPage: 6, activeCategory: '' };

      function showSkeletons() {
        grid.innerHTML = '';
        for(let i=0; i<6; i++) {
          grid.innerHTML += `
            <div class="ws-card">
              <div class="ws-card-banner"></div>
              <div class="ws-card-body">
                <div class="ws-header">
                  <div class="skeleton" style="width:50px; height:50px; border-radius:12px;"></div>
                  <div style="flex:1;">
                    <div class="skeleton" style="height:20px; width:70%; margin-bottom:8px;"></div>
                    <div class="skeleton" style="height:12px; width:40%;"></div>
                  </div>
                </div>
                <div class="skeleton" style="height:20px; width:80px; margin-bottom:15px;"></div>
                <div class="skeleton" style="height:15px; width:90%; margin-bottom:8px;"></div>
                <div class="skeleton" style="height:15px; width:90%; margin-bottom:20px;"></div>
                <div style="display:flex; gap:10px;">
                  <div class="skeleton" style="height:36px; flex:1;"></div>
                  <div class="skeleton" style="height:36px; width:36px;"></div>
                </div>
              </div>
            </div>`;
        }
      }

      async function loadData() {
        showSkeletons();
        try {
          const res = await fetch("/api/wholesalers");
          const data = await res.json();
          if(!data.success) throw new Error("Failed");
          state.all = data.wholesalers;
          const cities = [...new Set(state.all.map(w => w.shopAddress || w.city).filter(Boolean))];
          cities.forEach(city => {
            const opt = document.createElement("option");
            opt.value = city; opt.textContent = city;
            cityFilter.appendChild(opt);
          });
          applyFilters();
        } catch(e) {
          grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle" style="color:#ef233c;"></i><h3>Error Loading Data</h3><p>Please try refreshing the page.</p></div>`;
        }
      }

      const isValid = (val) => val && typeof val === 'string' && val.trim() !== "";
      const isVerified = (w) => isValid(w.name) && isValid(w.mobileNumber) && isValid(w.businessName) && isValid(w.gstNumber) && isValid(w.houseNo) && isValid(w.pincode);

      function applyFilters() {
        const term = searchInput.value.toLowerCase();
        const city = cityFilter.value;
        const vOnly = verifiedOnly.checked;
        state.filtered = state.all.filter(w => {
          const matchesSearch = (w.name && w.name.toLowerCase().includes(term)) || (w.businessName && w.businessName.toLowerCase().includes(term)) || (w.email && w.email.toLowerCase().includes(term));
          const matchesCategory = state.activeCategory === '' || w.businessCategory === state.activeCategory;
          const matchesCity = city === '' || (w.shopAddress === city || w.city === city);
          const matchesVerified = vOnly ? isVerified(w) : true;
          return matchesSearch && matchesCategory && matchesCity && matchesVerified;
        });
        if (sortBy.value === "newest") {
          state.filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        } else {
          state.filtered.sort((a,b) => (a.businessName || a.name).localeCompare(b.businessName || b.name));
        }
        state.page = 1;
        render();
      }

      chips.forEach(chip => {
        chip.addEventListener("click", () => {
          chips.forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          state.activeCategory = chip.dataset.val;
          applyFilters();
        });
      });

      function getAvatarColor(id) {
        const colors = ['#4361ee', '#2bc155', '#7209b7', '#f72585', '#e36414', '#10b981', '#f59e0b'];
        let num = 0;
        for(let i=0; i<id.length; i++) num += id.charCodeAt(i);
        return colors[num % colors.length];
      }

      function render() {
        grid.innerHTML = "";
        countBadge.innerText = state.filtered.length;
        if (state.filtered.length === 0) {
          paginationControls.style.display = "none";
          grid.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>No wholesalers found</h3><p>Try adjusting your search or filters to find what you're looking for.</p><button class="btn-clear" onclick="document.getElementById('searchInput').value=''; document.getElementById('cityFilter').value=''; document.getElementById('verifiedOnly').checked=false; document.querySelector('.chip[data-val=\\'\\']').click();">Clear Filters</button></div>`;
          return;
        }
        paginationControls.style.display = "flex";
        const start = (state.page - 1) * state.perPage;
        const items = state.filtered.slice(start, start + state.perPage);

        items.forEach(w => {
          const bName = w.businessName || w.name;
          const initial = bName.charAt(0).toUpperCase();
          const color = getAvatarColor(w._id);
          const verifiedHtml = isVerified(w) ? '<i class="fas fa-check-circle verified-badge" title="Verified Wholesaler"></i>' : '';
          const tag = w.businessCategory || 'General Wholesaler';
          const location = w.shopAddress || w.city || 'India';
          const card = document.createElement("div");
          card.className = "ws-card";
          let bannerStyle = "";
          if (w.businessPhotos && w.businessPhotos.length > 0) {
            const idx = w.primaryBusinessPhotoIndex || 0;
            const photo = w.businessPhotos[idx] || w.businessPhotos[0];
            bannerStyle = `style="background-image: url('${photo}')"`;
          } else if (w.businessPhotoUrl) {
            bannerStyle = `style="background-image: url('${w.businessPhotoUrl}')"`;
          }
          card.innerHTML = `
            <div class="ws-card-banner" ${bannerStyle}></div>
            <div class="ws-card-body">
              <div class="ws-header">
                <div class="ws-avatar" style="background:${color}">${initial}</div>
                <div class="ws-title">
                  <div class="ws-name">${bName} ${verifiedHtml} ${w.averageRating > 0 ? `<span style="font-size:12px; color:#fbbf24; margin-left:auto; display:flex; align-items:center; gap:3px;"><i class="fas fa-star"></i> ${w.averageRating.toFixed(1)}</span>` : ''}</div>
                  <div class="ws-owner">${w.name}</div>
                </div>
              </div>
              <div class="ws-tag">${tag}</div>
              <div class="ws-details">
                <div><i class="fas fa-map-marker-alt"></i> ${location}</div>
                <div><i class="fas fa-envelope"></i> ${w.email}</div>
              </div>
              <div class="ws-actions">
                <a href="items.html?id=${w._id}" class="btn-view">View Products</a>
                <button class="btn-contact" onclick="openContact('${w.name}', '${bName}', '${w.mobileNumber || 'Not provided'}', '${w.email}', '${w._id}')" title="Contact Info">
                  <i class="fas fa-phone"></i>
                </button>
              </div>
            </div>`;
          grid.appendChild(card);
        });
        renderPagination();
      }

      function renderPagination() {
        pageNumbers.innerHTML = "";
        const pages = Math.ceil(state.filtered.length / state.perPage);
        prevBtn.disabled = state.page === 1;
        nextBtn.disabled = state.page === pages;
        for (let i = 1; i <= pages; i++) {
          const btn = document.createElement("button");
          btn.className = "page-btn" + (i === state.page ? " active" : "");
          btn.textContent = i;
          btn.onclick = () => { state.page = i; render(); window.scrollTo(0, 0); };
          pageNumbers.appendChild(btn);
        }
      }

      prevBtn.onclick = () => { state.page--; render(); window.scrollTo(0, 0); };
      nextBtn.onclick = () => { state.page++; render(); window.scrollTo(0, 0); };

      searchInput.addEventListener("input", applyFilters);
      cityFilter.addEventListener("change", applyFilters);
      sortBy.addEventListener("change", applyFilters);
      verifiedOnly.addEventListener("change", applyFilters);

      loadData();
    });

    window.openContact = function(owner, biz, phone, email, id) {
      document.getElementById("modalBizName").innerText = biz;
      document.getElementById("modalOwnerName").innerText = owner;
      document.getElementById("modalPhone").innerText = phone;
      document.getElementById("modalEmailLink").innerText = email;
      document.getElementById("modalEmailLink").href = "mailto:" + email;
      document.getElementById("modalViewBtn").onclick = () => location.href = "items.html?id=" + id;
      document.getElementById("contactModal").classList.add("active");
    };

    window.closeModal = function() {
      document.getElementById("contactModal").classList.remove("active");
    };

    // Mobile menu toggle
    document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    });
  </script>
</body>
</html>
